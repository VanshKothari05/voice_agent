<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vansh Kothari — Voice Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080808; --surface: #111; --border: #1e1e1e; --border-hover: #2e2e2e;
      --text-primary: #f0ede8; --text-secondary: #555; --text-muted: #2e2e2e;
      --red: #c84b4b; --blue: #3d7fcc; --green: #3a8c5c; --amber: #c8943a;
      --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text-primary); font-family: var(--font-mono);
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 1fr;
      grid-template-areas: "header header" "left right" "footer footer";
      height: 100vh;
    }
    header {
      grid-area: header; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; border-bottom: 1px solid var(--border);
      animation: fadeUp 0.4s ease forwards;
    }
    .hname { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    .htag  { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
    .status-pill { display: flex; align-items: center; gap: 7px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
    .sdot.recording { background: var(--red);   animation: blink 1s infinite; }
    .sdot.thinking  { background: var(--amber); animation: blink 0.7s infinite; }
    .sdot.speaking  { background: var(--blue);  animation: blink 1.2s infinite; }
    .sdot.paused    { background: var(--amber); }
    .sdot.ready     { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .left-panel {
      grid-area: left; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; border-right: 1px solid var(--border); padding: 24px;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .orb-wrap { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
    .orb-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--border); transition: all 0.4s ease; }
    .orb-ring.recording { border-color: var(--red);  box-shadow: 0 0 0 1px var(--red),  0 0 28px rgba(200,75,75,0.12);  animation: rpulse 1.4s infinite; }
    .orb-ring.speaking  { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 0 28px rgba(61,127,204,0.12); animation: rpulse 1.4s infinite; }
    @keyframes rpulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.07);opacity:0.5} }
    .orb {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border-hover);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; position: relative; z-index: 2; user-select: none;
    }
    .orb:hover { border-color: #3a3a3a; transform: scale(1.03); }
    .orb:active { transform: scale(0.96); }
    .orb svg { width: 26px; height: 26px; transition: stroke 0.2s; }
    .hint { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
    .waveform { display: flex; align-items: center; gap: 3px; height: 20px; }
    .waveform span { display: block; width: 2px; background: var(--blue); border-radius: 2px; height: 4px; }
    .waveform.on span { animation: wave 0.8s ease-in-out infinite; }
    .waveform.on span:nth-child(1){animation-delay:0s}
    .waveform.on span:nth-child(2){animation-delay:.1s}
    .waveform.on span:nth-child(3){animation-delay:.2s}
    .waveform.on span:nth-child(4){animation-delay:.15s}
    .waveform.on span:nth-child(5){animation-delay:.05s}
    @keyframes wave { 0%,100%{height:4px} 50%{height:16px} }
    .ctrl-row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .cbtn {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: 5px 12px; cursor: pointer; color: var(--text-secondary);
      display: flex; align-items: center; gap: 5px; transition: all 0.2s;
    }
    .cbtn:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .cbtn.pause  { color: var(--amber); border-color: rgba(200,148,58,0.25); }
    .cbtn.resume { color: var(--green); border-color: rgba(58,140,92,0.25);  }
    .cbtn.stop   { color: var(--red);   border-color: rgba(200,75,75,0.25);  }
    .cbtn.pause:hover  { border-color: var(--amber); }
    .cbtn.resume:hover { border-color: var(--green); }
    .cbtn.stop:hover   { border-color: var(--red);   }
    .right-panel {
      grid-area: right; z-index: 1;
      display: flex; flex-direction: column; overflow: hidden;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .pblock { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; overflow: hidden; min-height: 0; }
    .pblock:first-child { border-bottom: 1px solid var(--border); }
    .plabel { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: white; margin-bottom: 12px; flex-shrink: 0; }
    .ptext  { font-size: 13px; line-height: 1.8; color: var(--text-secondary); flex: 1; overflow-y: auto; scrollbar-width: none; }
    .ptext::-webkit-scrollbar { display: none; }
    .ptext.you   { color: var(--text-primary); }
    .ptext.vansh { color: #7aabde; }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }
    .cur { display: inline-block; width: 2px; height: 13px; background: #7aabde; margin-left: 2px; vertical-align: middle; animation: cur 0.75s ease-in-out infinite; }
    footer {
      grid-area: footer; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 28px; border-top: 1px solid var(--border);
      animation: fadeUp 0.4s ease 0.3s both;
    }
    .fl { font-size: 9px; color: white; letter-spacing: 0.1em; text-transform: uppercase; }
    .fr { font-size: 9px; color: white; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<header>
  <div>
    <div class="hname">Vansh Kothari</div>
    <div class="htag">CE + Data Science · DJSCE Mumbai · 2027</div>
  </div>
  <div class="status-pill">
    <div class="sdot ready" id="sdot"></div>
    <span id="stext">ready</span>
  </div>
</header>

<div class="left-panel">
  <div class="orb-wrap">
    <div class="orb-ring" id="orb-ring"></div>
    <div class="orb" id="orb" onclick="orbClick()">
      <svg id="mic-svg" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9" y1="21" x2="15" y2="21"/>
      </svg>
    </div>
  </div>
  <div class="waveform" id="waveform"><span></span><span></span><span></span><span></span><span></span></div>
<div class="hint" id="hint" style="color: white;">click on mic to start/stop speaking or press and release spacebar</div>
  <div class="ctrl-row">
    <button class="cbtn pause"  id="btn-pause"     onclick="pauseAudio()"        style="display:none">⏸ pause</button>
    <button class="cbtn resume" id="btn-resume"    onclick="resumeAudio()"       style="display:none">▶ resume</button>
    <button class="cbtn stop"   id="btn-interrupt" onclick="interrupt()"         style="display:none">✕ interrupt</button>
    <button class="cbtn"                           onclick="resetAll()">reset</button>
    <button class="cbtn"                           onclick="downloadTranscript()">↓ transcript</button>
  </div>
</div>

<div class="right-panel">
  <div class="pblock">
    <div class="plabel">interviewer</div>
    <div class="ptext" id="transcript">—</div>
  </div>
  <div class="pblock">
    <div class="plabel">vansh</div>
    <div class="ptext" id="response">—</div>
  </div>
</div>

<footer>
  <div class="fl">deepgram · groq llama-3.3 · elevenlabs</div>
  <div class="fr">voice agent · built by vansh</div>
</footer>

<script>
  let mediaRecorder = null, audioChunks = [];
  let isRecording = false, isProcessing = false;
  let currentAudio = null, isPaused = false;
  let conversationLog = [];

  const ELEVEN_KEY   = 'sk_bb95d6d2cfd27ce2557488a8ff270553eed4e5421dfba6f7';
  const ELEVEN_VOICE = 'Gt8dLeTbiTia6lFGxhbv';


  const $ = id => document.getElementById(id);
  const orbRing = $('orb-ring'), sdot = $('sdot'), stext = $('stext');
  const transcriptEl = $('transcript'), responseEl = $('response');
  const waveform = $('waveform'), hint = $('hint'), micSvg = $('mic-svg');

  function setStatus(label, state) {
    stext.textContent = label;
    sdot.className = 'sdot ' + state;
    orbRing.className = 'orb-ring ' + (state === 'recording' ? 'recording' : state === 'speaking' ? 'speaking' : '');
    waveform.className = 'waveform ' + (state === 'speaking' ? 'on' : '');
    micSvg.setAttribute('stroke', state === 'recording' ? '#c84b4b' : state === 'speaking' ? '#3d7fcc' : '#555');
    hint.textContent = {
      recording: 'tap again to stop',
      thinking:  'thinking...',
      speaking:  'speaking...',
      paused:    'paused — tap orb to interrupt',
      ready:     'tap to speak'
    }[state] || 'tap to speak';
    $('btn-pause').style.display     = state === 'speaking' ? 'flex' : 'none';
    $('btn-resume').style.display    = state === 'paused'   ? 'flex' : 'none';
    $('btn-interrupt').style.display = (state === 'speaking' || state === 'paused') ? 'flex' : 'none';
  }

  async function startRecording() {
    if (isRecording || isProcessing) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); await pipeline(); };
      mediaRecorder.start();
      isRecording = true;
      setStatus('recording', 'recording');
    } catch (e) { hint.textContent = 'mic access denied'; }
  }

  function stopRecording() {
    if (!mediaRecorder || !isRecording) return;
    mediaRecorder.stop();
    isRecording = false; isProcessing = true;
    setStatus('processing...', 'thinking');
  }

  function orbClick() {
    if (currentAudio) { interrupt(); return; }
    if (isProcessing) return;
    isRecording ? stopRecording() : startRecording();
  }

  function pauseAudio() {
    if (!currentAudio || isPaused) return;
    currentAudio.pause(); isPaused = true;
    waveform.className = 'waveform';
    setStatus('paused', 'paused');
  }

  function resumeAudio() {
    if (!currentAudio || !isPaused) return;
    currentAudio.play(); isPaused = false;
    setStatus('speaking', 'speaking');
  }

  function interrupt() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; isPaused = false; }
    isProcessing = false;
    setStatus('ready', 'ready');
    setTimeout(() => startRecording(), 100);
  }

  function typewrite(text, el) {
    el.innerHTML = ''; el.className = 'ptext vansh';
    let i = 0;
    const speed = 42;
    const tick = setInterval(() => {
      if (i < text.length) {
        el.innerHTML = text.slice(0, ++i) + '<span class="cur"></span>';
      } else {
        clearInterval(tick); el.textContent = text;
      }
    }, speed);
  }

  async function pipeline() {
    try {
      // 1 — transcribe
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const fd = new FormData();
      fd.append('audio', blob, 'audio.webm');
      const tres = await fetch('/transcribe', { method: 'POST', body: fd });
      const { transcript } = await tres.json();
      if (!transcript) { setStatus('ready', 'ready'); isProcessing = false; return; }
      transcriptEl.textContent = transcript;
      transcriptEl.className = 'ptext you';
      conversationLog.push({ role: 'interviewer', content: transcript });
      setStatus('thinking', 'thinking');

      // 2 — get response
      const rres = await fetch('/respond', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript })
      });
      const { response } = await rres.json();
      if (!response) { setStatus('ready', 'ready'); isProcessing = false; return; }
      conversationLog.push({ role: 'vansh', content: response });

      // 3 — typewrite and fetch audio independently
      typewrite(response, responseEl);

   
      // replace this block with the ElevenLabs fetch and update ELEVEN_KEY
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(response);
      utterance.rate = 1.05;
      utterance.pitch = 1;
      setStatus('speaking', 'speaking');
      utterance.onend = () => {
        currentAudio = null; isPaused = false; isProcessing = false;
        setStatus('ready', 'ready');
      };
      utterance.onerror = () => {
        currentAudio = null; isPaused = false; isProcessing = false;
        setStatus('ready', 'ready');
      };
      currentAudio = { pause: () => window.speechSynthesis.cancel() };
      window.speechSynthesis.speak(utterance);

    } catch (e) {
      console.error(e);
      setStatus('ready', 'ready');
      isProcessing = false; currentAudio = null;
    }
  }

  async function resetAll() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    isProcessing = false; isRecording = false; isPaused = false;
    conversationLog = [];
    await fetch('/reset', { method: 'POST' });
    transcriptEl.textContent = '—'; transcriptEl.className = 'ptext';
    responseEl.textContent   = '—'; responseEl.className   = 'ptext';
    setStatus('ready', 'ready');
  }

  function downloadTranscript() {
    if (!conversationLog.length) return;
    const lines = conversationLog.map(m =>
      (m.role === 'interviewer' ? 'INTERVIEWER' : 'VANSH') + ': ' + m.content
    );
    const text = 'VANSH KOTHARI — VOICE AGENT INTERVIEW TRANSCRIPT\n' +
      new Date().toLocaleString() + '\n\n' +
      '='.repeat(50) + '\n\n' +
      lines.join('\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'vansh-interview-transcript.txt';
    a.click(); URL.revokeObjectURL(url);
  }


  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      if (currentAudio) { interrupt(); return; }
      if (!isRecording && !isProcessing) startRecording();
    }
    if (e.code === 'KeyP' && currentAudio && !isPaused) pauseAudio();
    if (e.code === 'KeyR' && currentAudio && isPaused) resumeAudio();
  });
  document.addEventListener('keyup', e => {
    // release space = stop recording (hold-to-talk)
    if (e.code === 'Space') { e.preventDefault(); if (isRecording) stopRecording(); }
  });
</script>
</body>
</html>
